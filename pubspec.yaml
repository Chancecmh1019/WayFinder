name: wayfinder
description: "WayFinder - 基於學習科學原理的 Android 單字學習應用程式"
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # GZip decompression (for GSAT-English.json.gz)
  archive: ^3.4.10

  # TTS (Text-to-Speech)
  flutter_tts: ^4.2.1

  # Utils
  equatable: ^2.0.5
  logger: ^2.3.0
  
  # Functional programming
  dartz: ^0.10.1
  
  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.2
  
  # Storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  
  # Audio
  audioplayers: ^6.1.0
  
  # Sharing
  share_plus: ^10.1.2
  
  # File picker
  file_picker: ^8.0.0+1
  
  # HTML parsing
  html: ^0.15.4
  flutter_html: ^3.0.0-beta.2
  
  # UUID generation
  uuid: ^4.5.1
  
  # Package info
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/GSAT-English.json.gz
  
  fonts:
    # Noto Serif TC - 中文襯線字體（文青風格）
    - family: NotoSerifTC
      fonts:
        - asset: assets/fonts/noto_serif_tc/NotoSerifTC-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/noto_serif_tc/NotoSerifTC-Light.ttf
          weight: 300
        - asset: assets/fonts/noto_serif_tc/NotoSerifTC-Regular.ttf
          weight: 400
        - asset: assets/fonts/noto_serif_tc/NotoSerifTC-Medium.ttf
          weight: 500
        - asset: assets/fonts/noto_serif_tc/NotoSerifTC-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/noto_serif_tc/NotoSerifTC-Bold.ttf
          weight: 700
        - asset: assets/fonts/noto_serif_tc/NotoSerifTC-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/noto_serif_tc/NotoSerifTC-Black.ttf
          weight: 900
    
    # Cormorant Garamond - 英文襯線字體（優雅風格）
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-Light.ttf
          weight: 300
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-Regular.ttf
          weight: 400
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-Medium.ttf
          weight: 500
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-Bold.ttf
          weight: 700
        - asset: assets/fonts/cormorant_garamond/CormorantGaramond-BoldItalic.ttf
          weight: 700
          style: italic